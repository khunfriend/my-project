<!DOCTYPE html>
{% load static %}
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Plants Oasis | Add Plant</title>
  <link rel="icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}?v=2">
  <link rel="stylesheet" href="{% static 'css/base.css' %}">
  <link rel="stylesheet" href="{% static 'css/form.css' %}">
</head>

<body>
<div class="admin-form-container">
  <div class="admin-form-header">
    <h1 class="admin-form-title">Add Plant</h1>
    <a href="{% url 'home' %}" class="admin-form-back">← Back to Home</a>
  </div>

  <div class="admin-form-card">
    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}

      <div class="form-group">
        <label for="id_name" class="form-label">Plant Name</label>
        <input type="text" name="name" id="id_name" required class="form-input">
      </div>

      <div class="form-group">
        <label for="id_price" class="form-label">Price</label>
        <input type="number" name="price" id="id_price" required class="form-input">
      </div>

      <div class="form-group">
        <label for="id_stock" class="form-label">Stock</label>
        <input type="number" name="stock" id="id_stock" required class="form-input">
      </div>

      <div class="form-group">
        <label for="id_image" class="form-label">Plant Image</label>
        <input type="file" name="image" id="id_image" accept="image/*" class="form-input">
        <p class="form-hint">Optional — accepts JPG, PNG, WEBP</p>
      </div>

      <button type="submit" class="btn btn-dark btn-full">Save</button>
    </form>
  </div>
</div>
</body>
</html>
