<!DOCTYPE html>
{% load static %}
<html lang="th">
<head>
    <title>Plants Oasis | Edit Plant</title>
    <link rel="icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}?v=2">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .shadow { box-shadow: 4px 4px 10px rgba(12, 2, 2, 0.2) !important; }
        .block { font-size: medium !important;}
        .colblack { color: black; font-size: 15px !important;}
    </style>
</head>

<body class="bg-gray-50 min-h-screen">
    <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-light text-gray-900">Edit Plant</h1>
            <a href="{% url 'home' %}"
               class="text-sm text-gray-600 hover:text-gray-900 colblack">
                ← Back to Home
            </a>
        </div>

        <!-- Form -->
        <div class="bg-white rounded-lg p-6 shadow">
            <form method="POST" class="space-y-6">
                {% csrf_token %}

                <div>
                    <label for="id_name" class="block text-sm font-medium text-gray-700 mb-1 block">Plant Name</label>
                    <input type="text" name="name" id="id_name" value="{{ plant.name }}" required
                           class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-gray-500 focus:border-transparent">
                </div>

                <div>
                    <label for="id_price" class="block text-sm font-medium text-gray-700 mb-1 block">Price</label>
                    <input type="number" name="price" id="id_price" value="{{ plant.price }}" required
                           class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-gray-500 focus:border-transparent">
                </div>

                <div>
                    <label for="id_stock" class="block text-sm font-medium text-gray-700 mb-1 block">Stock</label>
                    <input type="number" name="stock" id="id_stock" value="{{ plant.stock }}" required
                           class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-gray-500 focus:border-transparent">
                </div>

                <button type="submit"
                        class="w-full bg-gray-900 text-white py-2 px-4 rounded-md hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-500">
                    Save
                </button>
            </form>
        </div>
    </div>
</body>
</html>
