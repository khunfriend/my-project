<!DOCTYPE html>
{% load static %}
<html lang="th">
<head>
    <title>Plants Oasis | Edit Plant</title>
    <link rel="icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}?v=2">
    <link rel="stylesheet" href="{% static 'css/edit_plant.css' %}">
</head>

<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>Edit Plant</h1>
            <a href="{% url 'home' %}" class="back-link">← Back to Home</a>
        </div>

        <!-- Form -->
        <div class="form-card">
            <form method="POST">
                {% csrf_token %}

                <div class="form-group">
                    <label>Plant Name</label>
                    <p class="plant-name-display">{{ plant.name }}</p>
                </div>

                <div class="form-group">
                    <label for="id_price">Price</label>
                    <input type="number" name="price" id="id_price" value="{{ plant.price }}" required>
                </div>

                <div class="form-group">
                    <label for="id_stock">Stock</label>
                    <input type="number" name="stock" id="id_stock" value="{{ plant.stock }}" required>
                </div>

                <button type="submit" class="btn-save">Save</button>
            </form>
        </div>
    </div>
</body>
</html>
