<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .max-w-md {
            box-shadow: 4px 4px 10px rgba(12, 2, 2, 0.2);
        }
        .block {
            font-size: medium !important;
        }
        
    </style>
</head>

<body class="bg-gray-50 min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">

<div class="w-full max-w-md">
    <div class="bg-white">
        <div class="px-8 py-10">
            <h2 class="text-2xl font-light text-gray-900 mb-8">🌿Welcome back, let's grow together.</h2>

            <form method="POST" class="space-y-6">
                {% csrf_token %}

                <div>
                    <label for="id_username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input type="text" name="username" id="id_username" required
                           class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-gray-500 focus:border-transparent">
                </div>

                <div>
                    <label for="id_password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" name="password" id="id_password" required
                           class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-gray-500 focus:border-transparent">
                </div>

                <button type="submit"
                        class="w-full bg-gray-900 text-white py-2 px-4 rounded-md hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-500">
                    Login
                </button>
            </form>

            <div class="mt-6 text-center">
                <a href="/register/" class="block text-sm text-gray-600 hover:text-gray-900">Create Account</a>
            </div>

            {% if error %}
                <p class="block mt-4 text-sm text-red-600 text-center">{{ error }}</p>
            {% endif %}
        </div>
    </div>
</div>

</body>
</html>
