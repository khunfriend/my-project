<!DOCTYPE html>
{% load static %}
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Plants Oasis | Login</title>
  <link rel="icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}?v=2">
  <link rel="stylesheet" href="{% static 'css/base.css' %}">
  <link rel="stylesheet" href="{% static 'css/form.css' %}">
</head>

<body>
<div class="form-page">
  <div class="form-card">
    <div class="form-card-body">
      <h2 class="form-page-title">🌿 Welcome back, let's grow together.</h2>

      <form method="POST">
        {% csrf_token %}

        <div class="form-group">
          <label for="id_username" class="form-label">Username</label>
          <input type="text" name="username" id="id_username" required class="form-input">
        </div>

        <div class="form-group">
          <label for="id_password" class="form-label">Password</label>
          <input type="password" name="password" id="id_password" required class="form-input">
        </div>

        <button type="submit" class="btn btn-dark btn-full">Login</button>
      </form>

      <div class="form-footer">
        <a href="{% url 'register' %}">Create Account</a>
      </div>

      {% if error %}
        <p class="form-error">{{ error }}</p>
      {% endif %}
    </div>
  </div>
</div>
</body>
</html>
